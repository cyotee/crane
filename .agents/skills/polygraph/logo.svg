<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- polygraph.so logomark — polygraph oscillograph trace on ink ground -->
  <!-- Hard square — platforms (GitHub squircle, Slack rounded square, etc.)
       clip avatars themselves. Pre-rounded marks show "double rounding". -->
  <rect width="512" height="512" fill="#161512"/>

  <!-- faint baseline guide -->
  <line
    x1="48" y1="256" x2="464" y2="256"
    stroke="#5c5550"
    stroke-width="1.5"
    stroke-dasharray="6 10"
    opacity="0.55"
  />

  <!-- waveform: calm → spike cluster → calm -->
  <path
    d="M48 256
       L120 256
       L150 248 L180 264 L210 256
       L230 200 L246 312 L262 184 L278 326 L294 196 L310 320 L326 232 L342 280 L358 220 L374 292 L390 256
       L420 256
       L464 256"
    fill="none"
    stroke="#f5f1e5"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- tiny oxblood accent dot to echo the brand pulse -->
  <circle cx="86" cy="256" r="7" fill="#7a1f2b"/>
</svg>
