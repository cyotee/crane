name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: default

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    # Full monorepo compile is large; avoid SIGTERM ~15m kills on cold builds.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pin to match local stable formatting (avoids fmt drift vs floating nightlies).
          version: "v1.5.1"

      - name: Cache Foundry artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.svm
            cache_forge
            out
          key: foundry-${{ runner.os }}-1.5.1-${{ hashFiles('foundry.toml', 'foundry.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-${{ runner.os }}-1.5.1-

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        # Omit --sizes in CI: it adds wall-clock and memory on 5k+ unit builds.
        run: forge build

      - name: Run Forge tests
        run: forge test -vvv
