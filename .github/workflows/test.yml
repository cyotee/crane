name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Core framework only (see [profile.ci] in foundry.toml) — full monorepo OOMs GHA.
  FOUNDRY_PROFILE: ci
  FOUNDRY_THREADS: "1"

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Enable swap (compile is memory-heavy)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "v1.5.1"

      - name: Cache Foundry artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.svm
            cache_forge
            out
          key: foundry-${{ runner.os }}-1.5.1-${{ hashFiles('foundry.toml', 'foundry.lock', 'remappings.txt') }}
          restore-keys: |
            foundry-${{ runner.os }}-1.5.1-

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        # -j 1 keeps peak memory lower; omit --sizes (extra work).
        run: forge build -j 1

      - name: Run Forge tests
        run: forge test -j 1 -vvv
