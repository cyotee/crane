[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path  = 'cache_forge'
fs_permissions = [
    { access = "read", path = "./" },
    # CRANE-270: allow fork parity tests to persist JSON artifacts.
    { access = "read-write", path = "./tasks/CRANE-270-verify-balancer-v3-port/artifacts" },
    # Existing scripts export JSON under script/output.
    { access = "read-write", path = "./script/output" },
    # Aave V4 deployment-procedure and Logger tests write reports under ./output.
    { access = "read-write", path = "./output" },
    # Aave V4 vm.eip712HashType / vm.eip712HashStruct reads the generated EIP-712 bindings file.
    { access = "read", path = "./test/foundry/spec/protocols/lending/aave/v4/helpers/mocks/JsonBindings.sol" },
    # Liquity Bold NFTMetadata tests read trove SVG/font assets and write generated test_output HTML.
    { access = "read", path = "./utils/assets/" },
    { access = "read-write", path = "./utils/assets/test_output" },
    { access = "read-write", path = "./"},
    { access = "write", path = "./reports" },
    { access = "read", path = "./out" },
    { access = "read", path = "./config" }
]
# block_gas_limit = "9223372036854775807"
solc = "0.8.35"
sizes = true
optimizer = true
# optimizer_runs = 4294967295
# CamelotFactory requires 16683 to fit within execution code size limits
# optimizer_runs = 16683
# optimizer_runs = 2000
# optimizer_runs = 999
optimizer_runs = 1
# viaIR disabled - use structs to avoid "stack too deep" errors
viaIR = false
# Allow vm.expectRevert() for internal/library function calls (Foundry v1.0+ changed depth requirements)
allow_internal_expect_revert = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=contracts/external/openzeppelin-contracts/",
    "@crane/contracts/=contracts/",
    "@crane/test/=test/",
    "battlechain-lib/=lib/battlechain-lib/src/",
    "@oz/=lib/openzeppelin-contracts/",
    "@ozu=lib/openzeppelin-contracts-upgradable/"
]

ignored_error_codes = [
    2394, 
    3860, 
    5574, 
    2072,
    1878,
    # Unreachable code
    5740,
    # will be promoted to keyword in the future and will not be allowed as an identifier anymore
    6335,
    # Virtual modifiers are deprecated and scheduled for removal
    8429,
    # Natspec @return missing name (vendored Frax etc.)
    5856,
    # Tuple type conversion issues in vendored/generated protocol code (Liquity, Aerodrome)
    7407,
    # Documented parameter not found in function (natspec mismatch in core DFPkgs)
    3881
]

skip = [
    # Aave V3.6 upstream formal-verification trees that are not required for runtime compilation.
    "contracts/protocols/lending/aave/v3.6/dependencies/openzeppelin-contracts/certora/**",
    "contracts/protocols/lending/aave/v3.6/dependencies/openzeppelin-contracts-upgradeable/certora/**",
    # Aave V4 generated EIP-712 bindings file (kept out of test compilation; read at runtime via vm.eip712HashType).
    "test/foundry/spec/protocols/lending/aave/v4/helpers/mocks/JsonBindings.sol",
    # Liquity Bold upstream submodule — port lives in contracts/protocols/cdps/liquity/v2/.
    "lib/bold/**",
    # Frax upstream submodule — ported tree lives under contracts/protocols/tokens/stable/frax/.
    "lib/frax-solidity/**",
    # frax-std: tests only need FraxTest + helpers (skip script/proxy extras).
    "contracts/external/frax-std/FraxUpgradeableProxy.sol",
    "contracts/external/frax-std/FraxTransparentProxy.sol",
    "contracts/external/frax-std/BaseScript.sol",
    "contracts/external/frax-std/SafeTxHelper.sol",
    "contracts/external/frax-std/TestHelper.sol",
    "contracts/external/frax-std/Logger.sol",
    "contracts/external/frax-std/NumberFormat.sol",
    "contracts/external/frax-std/access-control/**",
    "contracts/external/frax-std/BytesHelper.sol",
]

[bind_json]
out = "test/foundry/spec/protocols/lending/aave/v4/helpers/mocks/JsonBindings.sol"
include = ["test/foundry/spec/protocols/lending/aave/v4/helpers/mocks/EIP712Types.sol"]

[invariant]
runs = 50
depth = 5
# corpus_dir = 'corpus'
# corpus_gzip = true

[profile.default.fmt]
skip = ["lib/"]

[lint]
exclude_lints = [
    "erc20-unchecked-transfer",
    "unused-import",
    "mixed-case-variable",
    "mixed-case-function",
    "unaliased-plain-import",
    "screaming-snake-case-immutable",
    "screaming-snake-case-const",
    "pascal-case-struct",
    "incorrect-shift",
    "divide-before-multiply",
    "modifier-style",
    "unsafe-typecast",
    "unwrapped-modifier-logic",
    "unsafe-cheatcode",
    "named-struct-fields"
]
