[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path  = 'cache_forge'
fs_permissions = [
    { access = "read", path = "./" },
    # CRANE-270: allow fork parity tests to persist JSON artifacts.
    { access = "read-write", path = "./tasks/CRANE-270-verify-balancer-v3-port/artifacts" },
    # Existing scripts export JSON under script/output.
    { access = "read-write", path = "./script/output" }
]
# block_gas_limit = "9223372036854775807"
solc = "0.8.34"
sizes = true
optimizer = true
# optimizer_runs = 4294967295
# CamelotFactory requires 16683 to fit within execution code size limits
# optimizer_runs = 16683
# optimizer_runs = 2000
# optimizer_runs = 999
optimizer_runs = 1
# viaIR disabled - use structs to avoid "stack too deep" errors
viaIR = false
# Allow vm.expectRevert() for internal/library function calls (Foundry v1.0+ changed depth requirements)
allow_internal_expect_revert = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@crane/contracts/=contracts/"
]

ignored_error_codes = [
    2394, 
    3860, 
    5574, 
    2072
]

skip = [
    "lib/reclamm/**",
    # Euler v1 - external dep issues (LayerZero, Solmate, Uniswap V4, Pendle, Pyth)
    "contracts/protocols/lending/euler/v1/**",
    # External packages with missing dependencies
    "contracts/external/openzeppelin-upgradeable/**",
    "contracts/external/layerzero/**",
    "contracts/external/pendle/**",
    "contracts/external/pyth/**",
    "contracts/external/redstone/**",
    "contracts/external/uniswap/**",
]

[invariant]
runs = 50
depth = 5
# corpus_dir = 'corpus'
# corpus_gzip = true

[profile.default.fmt]
skip = ["lib/"]

[lint]
exclude_lints = [
    "erc20-unchecked-transfer",
    "unused-import",
    "mixed-case-variable",
    "mixed-case-function",
    "unaliased-plain-import",
    "screaming-snake-case-immutable",
    "screaming-snake-case-const",
    "pascal-case-struct",
    "incorrect-shift",
    "divide-before-multiply",
    "modifier-style",
    "unsafe-typecast",
    "unwrapped-modifier-logic",
    "unsafe-cheatcode",
    "named-struct-fields"
]
